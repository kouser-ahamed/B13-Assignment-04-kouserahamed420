<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Job Application Tracker</title>


    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

    <!-- font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet" />

    <style>
        * {
            font-family: "Geist", sans-serif;
        }
    </style>
</head>

<body class="min-h-screen bg-base-200">
  <header class="w-[95%] sm:w-[90%] md:w-[80%] text-center sm:text-left mx-auto pt-[50px]">
    <h1 class="text-[32px] font-bold text-[#002C5C] mb-5">Job Application Tracker</h1>

    <div class="grid grid-cols-1 sm:grid-cols-3 gap-5">
        <div class="bg-base-100 p-5  rounded-xl">
            <p>Total</p>
            <p id="total-job-count" class="text-[#002C5C] text-[24px] font-bold">0</p>
        </div>
        <div class="bg-base-100 p-5  rounded-xl">
            <p>Interview</p>
            <p  id="total-interview-count" class="text-[#10B981] text-[24px] font-bold">0</p>
        </div>
        <div class="bg-base-100 p-5  rounded-xl">
            <p>Rejected</p>
            <p id="total-rejected-count" class="text-[#EF4444] text-[24px] font-bold">0</p>
        </div>
    </div>
  </header>


  <hr class="w-[95%] sm:w-[90%] md:w-[80%] mx-auto text-[#E6E7E9] mt-7">





</body>

</html>
